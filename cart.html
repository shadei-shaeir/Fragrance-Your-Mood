<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>فاتورة الطلب - Fragrance Your Mood</title>
  <link rel="stylesheet" href="style/main.css">
  <style>
    .cart-container {
      max-width:700px;
      margin:30px auto;
      background:#111;
      padding:20px;
      border-radius:8px;
      border:1px solid #333;
    }
    .cart-item {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:15px;
      padding:10px 0;
      border-bottom:1px solid #333;
    }
    .cart-item img {
      width:80px;
      height:80px;
      object-fit:cover;
      border-radius:6px;
    }
    .cart-info {
      flex:1;
    }
    .cart-info h4 {margin:0; color:#d4af37; font-size:16px;}
    .cart-info span {color:#ccc; font-size:14px;}
    .cart-item button {
      background:red;
      border:none;
      color:#fff;
      padding:5px 10px;
      border-radius:4px;
      cursor:pointer;
    }
    .cart-total {
      text-align:right;
      margin-top:15px;
      font-size:16px;
      color:#fff;
    }
    .cart-actions {
      margin-top:20px;
      display:flex;
      gap:10px;
    }
    .cart-actions button {
      flex:1;
      padding:10px;
      border:none;
      border-radius:6px;
      background:#d4af37;
      color:#111;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1>🧾 فاتورة الطلب</h1>
  </header>

  <main>
    <div class="cart-container">
      <div id="cart-items"></div>
      <div class="cart-total">الإجمالي: <span id="cart-total">0</span> SAR</div>
      <div class="cart-actions">
        <button id="clear-cart">إفراغ السلة</button>
        <button id="send-whatsapp">إرسال عبر واتساب</button>
      </div>
    </div>
  </main>

  <script>
    function loadCart(){
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      const container = document.getElementById("cart-items");
      const totalEl = document.getElementById("cart-total");
      container.innerHTML = "";
      let total = 0;

      cart.forEach((item, index)=>{
        total += item.price;
        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
          <img src="${item.image || 'assets/logo.svg'}" alt="${item.name}">
          <div class="cart-info">
            <h4>${item.name}</h4>
            <span>${item.price} SAR</span>
          </div>
          <button onclick="removeItem(${index})">حذف</button>
        `;
        container.appendChild(div);
      });

      totalEl.textContent = total;
    }

    function removeItem(index){
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.splice(index,1);
      localStorage.setItem("cart", JSON.stringify(cart));
      loadCart();
    }

    document.getElementById("clear-cart").addEventListener("click", ()=>{
      localStorage.removeItem("cart");
      loadCart();
    });

    document.getElementById("send-whatsapp").addEventListener("click", ()=>{
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      if(cart.length === 0){ alert("السلة فارغة"); return; }
      let msg = "طلب جديد:\n";
      let total = 0;
      cart.forEach(item=>{
        msg += `- ${item.name}: ${item.price} SAR\n`;
        total += item.price;
      });
      msg += `\nالإجمالي: ${total} SAR`;
      window.open(`https://wa.me/966573052266?text=${encodeURIComponent(msg)}`);
    });

    loadCart();
  </script>
</body>
</html>
